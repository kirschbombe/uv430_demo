<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal Viewer 4.3.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/universalviewer@4.3.0/dist/uv.css" />
    <script src="https://cdn.jsdelivr.net/npm/universalviewer@4.3.0/dist/umd/UV.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
      #uv { position: absolute; top: 0; left: 0; right: 0; bottom: 44px; }
      #options { position: absolute; bottom: 0; left: 0; right: 0; height: 44px; display: flex; gap: 8px; padding: 6px; background: #222; }
      #manifest { flex: 1; padding: 4px; }
      button { padding: 4px 12px; }
    </style>
  </head>
  <body>
    <div id="uv"></div>
    <div id="options">
      <input id="manifest" type="text" placeholder="Paste a manifest URL and click Set" />
      <button id="setManifestButton">Set</button>
    </div>

    <script>
      var DEFAULT_MANIFEST = "https://raw.githubusercontent.com/kirschbombe/perseguido/main/output/full-run.json";

      var urlAdapter = new UV.IIIFURLAdapter();

      var uv = UV.init("uv", urlAdapter.getInitialData({
        iiifManifestId: DEFAULT_MANIFEST,
        debug: false
      }));

      urlAdapter.bindTo(uv);

      uv.on("configure", function(data) {
        data.config.modules = data.config.modules || {};
        data.config.modules.contentLeftPanel = data.config.modules.contentLeftPanel || {};
        data.config.modules.contentLeftPanel.options = data.config.modules.contentLeftPanel.options || {};
        data.config.modules.contentLeftPanel.options.defaultToTreeEnabled = true;
        data.complete(data.config);
      });

      uv.on("created", function() {
        uv.publish("openTreeView");
      });

      document.getElementById("setManifestButton").addEventListener("click", function() {
        var value = document.getElementById("manifest").value.trim();
        if (value) uv.set(urlAdapter.getInitialData({ iiifManifestId: value, debug: false }));
      });
    </script>
  </body>
</html>
